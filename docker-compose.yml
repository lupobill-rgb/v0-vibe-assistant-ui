version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "${API_PORT:-3001}:3001"
    environment:
      - NODE_ENV=production
      - DATABASE_PATH=/data/vibe.db
      - API_PORT=3001
    volumes:
      - ./data:/data
    restart: unless-stopped

  executor:
    build:
      context: .
      dockerfile: apps/executor/Dockerfile
    environment:
      - NODE_ENV=production
      - DATABASE_PATH=/app/data/vibe.db
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./data:/app/data
    depends_on:
      - api

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=http://api:3001
    depends_on:
      - api
    restart: unless-stopped
