name: Guardrail Files

# Protects rules-of-engagement files from silent deletion.
# Triggered by the 2026-04-15 incident: CLAUDE.md was deleted from the repo,
# went unnoticed for several days, and dashboard regressions traced back to
# the absence of the rules file. This workflow makes that failure mode
# structurally impossible.
#
# See CLAUDE.md Section 2.8 and Section 4.1.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  guardrail-files-exist:
    name: Guardrail files must exist
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify CLAUDE.md exists
        run: |
          if [ ! -f CLAUDE.md ]; then
            echo "::error file=CLAUDE.md::CLAUDE.md is missing from the repo root."
            echo "::error::This file is the agent operating rules. See Section 2.8 of the previous version."
            echo "::error::Restore CLAUDE.md before merging. The canonical version should be recoverable from git history or from the local C: drive backup."
            exit 1
          fi
          echo "âś“ CLAUDE.md present"

      - name: Verify DEPLOY_CHECKLIST.md exists
        run: |
          if [ ! -f DEPLOY_CHECKLIST.md ]; then
            echo "::error file=DEPLOY_CHECKLIST.md::DEPLOY_CHECKLIST.md is missing from the repo root."
            echo "::error::This file is the blast-radius gate. See CLAUDE.md Section 2.8."
            echo "::error::Restore DEPLOY_CHECKLIST.md before merging."
            exit 1
          fi
          echo "âś“ DEPLOY_CHECKLIST.md present"

  guardrail-files-complete:
    name: CLAUDE.md must not contain unresolved placeholders
    runs-on: ubuntu-latest
    needs: guardrail-files-exist
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify CLAUDE.md has no NEEDS_UPDATE placeholders
        run: |
          if grep -n "NEEDS_UPDATE" CLAUDE.md; then
            echo "::error file=CLAUDE.md::CLAUDE.md contains {{NEEDS_UPDATE}} placeholders (lines shown above)."
            echo "::error::Section 1 Current Position and any other placeholder fields must be filled in with real values before commit."
            echo "::error::Committing a draft version with placeholders is worse than the previous state â€” it tells future sessions the current position is unknown."
            exit 1
          fi
          echo "âś“ CLAUDE.md has no unresolved placeholders"

      - name: Verify CLAUDE.md has Section 1 Current Position filled
        run: |
          # Section 1 must contain non-empty values for Active sprint, Blocking, Next to ship.
          # The pattern checks that each field has actual content after the colon, not just
          # whitespace or placeholder markers.
          if ! grep -E "^\*\*Active sprint:\*\*\s+\S+" CLAUDE.md > /dev/null; then
            echo "::error file=CLAUDE.md::Section 1 Active sprint field is empty or malformed."
            exit 1
          fi
          if ! grep -E "^\*\*Blocking:\*\*\s+\S+" CLAUDE.md > /dev/null; then
            echo "::error file=CLAUDE.md::Section 1 Blocking field is empty or malformed."
            exit 1
          fi
          if ! grep -E "^\*\*Next to ship:\*\*\s+\S+" CLAUDE.md > /dev/null; then
            echo "::error file=CLAUDE.md::Section 1 Next to ship field is empty or malformed."
            exit 1
          fi
          echo "âś“ CLAUDE.md Section 1 Current Position has all three fields filled"

  guardrail-files-encoding:
    name: CLAUDE.md must be UTF-8 with no BOM
    runs-on: ubuntu-latest
    needs: guardrail-files-complete
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify CLAUDE.md is UTF-8 with no BOM
        run: |
          # Added 2026-04-15 after b47bd6a corruption: file was committed as
          # UTF-16 LE with BOM, git diff showed 0/0 because text was
          # normalized for comparison, but the actual blob was unreadable.
          # This check catches that exact failure mode.

          first_bytes=$(head -c 4 CLAUDE.md | od -An -tx1 | tr -d ' \n' | tr 'a-f' 'A-F')

          # UTF-16 LE BOM = FFFE
          if [[ "$first_bytes" == FFFE* ]]; then
            echo "::error file=CLAUDE.md::CLAUDE.md is UTF-16 LE encoded (starts with FFFE BOM)."
            echo "::error::Convert to UTF-8 with: iconv -f UTF-16LE -t UTF-8 CLAUDE.md -o CLAUDE.md.utf8 && mv CLAUDE.md.utf8 CLAUDE.md"
            echo "::error::Or download fresh from source and copy directly without opening in any editor."
            exit 1
          fi

          # UTF-16 BE BOM = FEFF
          if [[ "$first_bytes" == FEFF* ]]; then
            echo "::error file=CLAUDE.md::CLAUDE.md is UTF-16 BE encoded (starts with FEFF BOM)."
            echo "::error::Convert to UTF-8 with: iconv -f UTF-16BE -t UTF-8 CLAUDE.md -o CLAUDE.md.utf8 && mv CLAUDE.md.utf8 CLAUDE.md"
            exit 1
          fi

          # UTF-8 BOM = EFBBBF (workable but not preferred)
          if [[ "$first_bytes" == EFBB* ]]; then
            echo "::warning file=CLAUDE.md::CLAUDE.md is UTF-8 with BOM."
            echo "::warning::Strip BOM with: sed -i '1s/^\xEF\xBB\xBF//' CLAUDE.md"
            # Warning, not failure â€” UTF-8 with BOM is parseable
          fi

          # Verify file is valid UTF-8 by attempting to decode it
          if ! iconv -f UTF-8 -t UTF-8 CLAUDE.md > /dev/null 2>&1; then
            echo "::error file=CLAUDE.md::CLAUDE.md contains invalid UTF-8 byte sequences."
            exit 1
          fi

          # Sanity check on byte count â€” UTF-16 corruption doubles file size
          byte_count=$(wc -c < CLAUDE.md)
          line_count=$(wc -l < CLAUDE.md)

          if [ "$byte_count" -gt 80000 ]; then
            echo "::warning file=CLAUDE.md::CLAUDE.md is $byte_count bytes â€” larger than expected (~30KB)."
            echo "::warning::Possible UTF-16 encoding (each ASCII char takes 2 bytes) or unexpected content growth."
          fi

          if [ "$line_count" -lt 100 ]; then
            echo "::error file=CLAUDE.md::CLAUDE.md has only $line_count lines â€” expected ~379."
            echo "::error::Likely truncation or line-ending corruption."
            exit 1
          fi

          echo "âś“ CLAUDE.md is valid UTF-8, $byte_count bytes, $line_count lines"

  guardrail-files-recent:
    name: CLAUDE.md Last updated must be within 30 days
    runs-on: ubuntu-latest
    needs: guardrail-files-encoding
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify CLAUDE.md Last updated date is recent
        run: |
          # Extract the Last updated date from Section 1.
          # Format: **Last updated:** YYYY-MM-DD
          last_updated=$(grep -oE '\*\*Last updated:\*\*\s+[0-9]{4}-[0-9]{2}-[0-9]{2}' CLAUDE.md | grep -oE '[0-9]{4}-[0-9]{2}-[0-9]{2}' | head -1)

          if [ -z "$last_updated" ]; then
            echo "::warning file=CLAUDE.md::Could not parse Last updated date from Section 1."
            echo "::warning::Expected format: **Last updated:** YYYY-MM-DD"
            exit 0
          fi

          last_updated_seconds=$(date -d "$last_updated" +%s 2>/dev/null || echo 0)
          now_seconds=$(date +%s)
          age_days=$(( (now_seconds - last_updated_seconds) / 86400 ))

          echo "CLAUDE.md Last updated: $last_updated ($age_days days ago)"

          if [ "$age_days" -gt 30 ]; then
            echo "::warning file=CLAUDE.md::CLAUDE.md Last updated is $age_days days old (over 30 days)."
            echo "::warning::Per Section 1 of CLAUDE.md, stale current-position fields are the most common source of sessions proposing the wrong thing confidently."
            echo "::warning::Consider updating Section 1 Active sprint, Blocking, and Next to ship to reflect current state."
            # Warning only â€” does not fail the build. Stale rules are a smell, not a blocker.
          else
            echo "âś“ CLAUDE.md Last updated is within 30 days"
          fi
