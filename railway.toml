[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/api/Dockerfile"
buildArgs = { CACHEBUST = "${{RAILWAY_GIT_COMMIT_SHA}}" }

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

